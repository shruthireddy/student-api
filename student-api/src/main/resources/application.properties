spring.application.name=student-api
# MySQL Connection Settings
# Syntax: {VARIABLE_NAME:default_value}
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/student_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root12345}

# Hibernate Settings (This creates your tables automatically!)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect