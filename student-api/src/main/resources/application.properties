spring.application.name=student-api
# 1. THE CONNECTION (Persistence)
# The ';DB_CLOSE_ON_EXIT=FALSE' prevents the DB from closing too early during shutdown
spring.datasource.url=jdbc:h2:file:./data/studentdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. THE CONSOLE (Visibility)
spring.h2.console.enabled=true
# This allows you to open the H2 console in a separate tab/frame if needed
spring.h2.console.settings.web-allow-others=true
# This fixes the 'Frame Options' error some browsers show
spring.h2.console.settings.trace=false

# 3. JPA & HIBERNATE (Database Strategy)
# 'update' is best for dev; it adds new columns without deleting old data
spring.jpa.hibernate.ddl-auto=update
# This prints the actual SQL Hibernate is writing in your IntelliJ console (Great for debugging!)
spring.jpa.show-sql=true
# Makes the printed SQL look pretty and readable
spring.jpa.properties.hibernate.format_sql=true
# Tells Hibernate to use H2-specific syntax
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect